<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <header>
        <img src="./assets/images/mobile-logo.png" alt="Logo OwnYourPlate">

    </header>
    <main>
        <h1>Approprie toi ton assiette !</h1>
        <div></div> <!--barre de séparation-->
        <section> <!--Barre de recherche-->
            <form action="" method = "POST">
                <input class = "soft-shadow soft-border" type="search" name = "searchBar" id = "searchBar" placeholder="Rechercher">
                <button class = "small-button soft-shadow soft-border" type = "submit">Rechercher</button>
                <button class = "small-button soft-shadow soft-border" type = "reset">Effacer</button>
            </form>
        </section>

        <section id = "search-results" class ="soft-shadow soft-border"> <!--Résultat recherche-->
            <article class = "result-product"> <!--Produit-->
                <div>
                    <img src="./assets/images/skyr-1.png" alt="Image d'un produit">
                    <h3>Skyr Nature 0% - Yoplait - 850g</h3>
                </div>
                <div class = "text-number">
                    <p>Calories/100g : </p>
                    <div class = "number-box soft-border">
                        <p>226 kJ</p>
                        <p>57 kCal</p>
                    </div>
                </div>
                <div>
                    <p>...</p>
                    <button class = "small-button soft-border soft-shadow">Ajouter</button>
                </div>
                <div></div>
            </article>
        </section>
        <button class = "soft-border soft-shadow large-button" type = "POST">Aliments Personnalisés</button>
    </main>
    
</body>
</html>

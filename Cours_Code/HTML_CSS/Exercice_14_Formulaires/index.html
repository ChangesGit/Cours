<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="./index.html" method = "post">
        <fieldset>
            <legend>Infos Personnelles</legend>

            <label for="prenom">Prénom : </label>
            <input type="text" name = "prenom" id = "prenom" maxlength="20" minlength="2" placeholder="Ex : Richard"> <br>

            <label for="nom">Nom : </label>
            <input type="text" name = "nom" id = "nom" maxlength="20" minlength="2" placeholder="Ex : Richelieu"> <br>

            <label for="email">E-mail : </label>
            <input type="email" name = "email" id = "email" placeholder="Ex : exemple@test.com"> <br>
            
            <label for="tel">Numéro : </label>
            <input type="tel" name = "tel" id = "tel" placeholder="Ex : 06 06 06 06 06"> <br>
            
            <label for="password">Mot de passe : </label>
            <input type="password" id = "password" minlength="8" maxlength="30" placeholder="A#25!dfE4"> <br>

            <label for="age">Age : </label>
            <input type="number" name = "age" id = "age" placeholder="Ex : 27"> <br>

            <label for="commentaire">Laissez un commentaire : </label> <br>
            <textarea name="Commentaire" id="commentaire" rows="10" cols="70" placeholder="Je trouve quand même que ..."></textarea> <br>

            <label for="date">Date de mon commentaire : </label>
            <input type="date" name="date" id="date"> <br>

            <label for="file">Ma photo : </label>
            <input type="file" name = "file" id = "file" accept=".png, .jpeg, .gif, .webp">
        </fieldset>

        <fieldset>
            <legend>Vous préférez : </legend>

            <input type="checkbox" name="HTML" id="html" checked>     <label for="html">Le HTML</label><br> 

            <input type="checkbox" name = "CSS" id = "CSS">             <label for="CSS">Le CSS</label> <br>

            <input type="checkbox" name="javascript" id="javascript">             <label for="Javascript">Le JavaScript</label><br>
            
            <input type="checkbox" name="rien" id="rien"> <label for="Rien">Ne rien faire</label>
        </fieldset>

        <fieldset>
            <legend>Vous vous levez : </legend>

            <input type="radio" name="radio" id="radio1" checked>
            <label for="radio1">Le matin</label> <br>

            <input type="radio" name="radio" id="radio2">
            <label for="radio2">Le midi</label> <br>

            <input type="radio" name="radio" id="radio3">
            <label for="radio3">Le soir</label> <br>
            
            <input type="radio" name="radio" id="radio4">
            <Label for = "raido4">En retard !</Label>
        </fieldset>

        <fieldset>
            <legend>Fin du formulaire</legend>

            <label for="fin">Vous en avez assez ?</label>

            <select name="fin" id="fin">

                <optgroup label = "Team pas encore">
                    <option value="J'en  veux plus">J'en veux plus</option>
                    <option value="C'est super !">C'est super !</option>
                </optgroup>

                <optgroup label="Team Oula">
                    <option value="J'en ai marre">J'en ai marre</option>
                    <option value="Pitié !">Pitié !</option>
                </optgroup>

            </select> <br>
            <button type = "submit">Envoyer</button>
            <button type="reset">Reset</button>
        </fieldset>

    </form>
</body>
</html>
